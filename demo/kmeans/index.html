<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>K-Means クラスタリング デモ — 人間情報システム研究室</title>
  <link rel="stylesheet" href="../../style.css">
  <style>
    .demo-title{font-size:2rem;font-weight:600;letter-spacing:-1.28px;margin-bottom:8px}
    .demo-desc{font-size:1rem;color:var(--color-text-secondary);margin-bottom:24px}
    .demo-grid{display:grid;grid-template-columns:1fr 220px;gap:20px;align-items:start}
    .left-col{display:flex;flex-direction:column;gap:16px}
    .canvas-wrap{box-shadow:var(--shadow-card);border-radius:12px;overflow:hidden;aspect-ratio:1;position:relative}
    .canvas-wrap canvas{display:block;width:100%;height:100%;cursor:crosshair}
    .chart-wrap{box-shadow:var(--shadow-card);border-radius:8px;overflow:hidden;height:140px}
    .chart-wrap canvas{display:block;width:100%;height:100%}
    .explain{box-shadow:var(--shadow-card);border-radius:8px;padding:16px}
    .explain-head{font-family:var(--font-mono);font-size:.75rem;font-weight:500;text-transform:uppercase;color:var(--color-text-muted);margin-bottom:6px}
    .explain-body{font-size:.875rem;font-weight:500;color:var(--color-text-secondary);line-height:1.7}
    .ctrl{box-shadow:var(--shadow-card);border-radius:8px;padding:20px;display:flex;flex-direction:column;gap:14px}
    .ctrl-head{font-family:var(--font-mono);font-size:.75rem;font-weight:500;text-transform:uppercase;color:var(--color-text-muted);letter-spacing:.04em}
    .ctrl-group{display:flex;flex-direction:column;gap:6px}
    .ctrl-row{display:flex;justify-content:space-between;align-items:center}
    .ctrl-label{font-size:.875rem;font-weight:500;color:var(--color-text)}
    .ctrl-val{font-family:var(--font-mono);font-size:1.25rem;font-weight:600;letter-spacing:-.96px}
    input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:4px;background:#ebebeb;border-radius:2px;outline:none}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--color-text);cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.15)}
    input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--color-text);cursor:pointer;border:none}
    .btn{font-family:var(--font-sans);font-size:.875rem;font-weight:500;padding:9px 14px;border-radius:6px;border:none;cursor:pointer;text-align:center;transition:background .15s}
    .btn:disabled{opacity:.4;cursor:not-allowed}
    .btn-dark{background:var(--color-text);color:#fff}
    .btn-dark:hover:not(:disabled){background:#000}
    .btn-ghost{background:#fff;color:var(--color-text);box-shadow:var(--shadow-border)}
    .btn-ghost:hover:not(:disabled){background:var(--color-surface)}
    .btn-row{display:flex;gap:8px}
    .btn-row .btn{flex:1}
    .preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
    .preset-grid .btn{font-size:.75rem;padding:7px 4px}
    .toggle-row{display:flex;align-items:center;justify-content:space-between}
    .toggle{position:relative;width:36px;height:20px;cursor:pointer}
    .toggle input{opacity:0;width:0;height:0;position:absolute}
    .toggle-track{position:absolute;inset:0;background:#ebebeb;border-radius:10px;transition:background .2s}
    .toggle input:checked+.toggle-track{background:var(--color-text)}
    .toggle-knob{position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 2px rgba(0,0,0,.15)}
    .toggle input:checked~.toggle-knob{transform:translateX(16px)}
    .stat-row{display:flex;justify-content:space-between;font-size:.75rem;font-weight:500}
    .stat-label{color:var(--color-text-muted)}
    .stat-val{font-family:var(--font-mono);font-weight:600;color:var(--color-text)}
    .badge{display:inline-block;font-size:.6875rem;font-weight:600;padding:2px 8px;border-radius:9999px;background:#ebf5ff;color:#0068d6}
    .badge.ok{background:#ecfdf5;color:#059669}
    hr.div{border:none;border-top:1px solid #ebebeb;margin:0}
    @media(max-width:768px){.demo-grid{grid-template-columns:1fr}.ctrl{order:-1}}
  </style>
</head>
<body>
<header class="site-header"><div class="container">
  <a href="../../" style="font-size:.875rem;font-weight:500;color:var(--color-text-muted)">&larr; Top</a>
  <h1 class="demo-title">K-Means Clustering</h1>
</div></header>
<main><section class="section"><div class="container">
<div class="demo-grid">
    <div class="left-col">
      <div class="canvas-wrap"><canvas id="cv"></canvas></div>
      <div class="chart-wrap"><canvas id="ch"></canvas></div>
      <div class="explain"><div class="explain-head">Step 解説</div><div id="ex" class="explain-body">データを配置して Step / Run を押してください．</div></div>
    </div>
    <div class="ctrl">
      <span class="ctrl-head">Controls</span>
      <div class="ctrl-group">
        <div class="ctrl-row"><span class="ctrl-label">クラスタ数 k</span><span class="ctrl-val" id="kv">3</span></div>
        <input type="range" id="ks" min="2" max="8" value="3">
      </div>
      <div class="ctrl-group">
        <div class="ctrl-row"><span class="ctrl-label">データ点数</span><span class="ctrl-val" id="nv">150</span></div>
        <input type="range" id="ns" min="20" max="500" step="10" value="150">
      </div>
      <div class="btn-row">
        <button class="btn btn-dark" id="bs" disabled>Step</button>
        <button class="btn btn-dark" id="br" disabled>Run</button>
      </div>
      <button class="btn btn-ghost" id="bx">Reset</button>
      <div class="toggle-row">
        <span class="ctrl-label">自動再生</span>
        <label class="toggle"><input type="checkbox" id="ap"><div class="toggle-track"></div><div class="toggle-knob"></div></label>
      </div>
      <hr class="div">
      <div class="ctrl-group">
        <span class="ctrl-label">サンプルデータ</span>
        <div class="preset-grid">
          <button class="btn btn-ghost" data-p="blobs">Blobs</button>
          <button class="btn btn-ghost" data-p="ring">Ring</button>
          <button class="btn btn-ghost" data-p="moons">Moons</button>
          <button class="btn btn-ghost" data-p="random">Random</button>
        </div>
      </div>
      <hr class="div">
      <div class="ctrl-group">
        <span class="ctrl-head">Status</span>
        <div class="stat-row"><span class="stat-label">データ点数</span><span class="stat-val" id="sn">0</span></div>
        <div class="stat-row"><span class="stat-label">イテレーション</span><span class="stat-val" id="si">—</span></div>
        <div class="stat-row"><span class="stat-label">SSE</span><span class="stat-val" id="ss">—</span></div>
        <div class="stat-row"><span class="stat-label">状態</span><span class="badge" id="sb">待機中</span></div>
      </div>
    </div>
  </div>
</div></section></main>
<footer class="site-footer"><div class="container">&copy; 人間情報システム研究室 — 大阪公立大学</div></footer>
<script>
(function(){
  const COL=[
    {f:"rgba(10,114,239,.3)",s:"#0a72ef"},{f:"rgba(222,29,141,.3)",s:"#de1d8d"},
    {f:"rgba(255,91,79,.3)",s:"#ff5b4f"},{f:"rgba(5,150,105,.3)",s:"#059669"},
    {f:"rgba(121,40,202,.3)",s:"#7928ca"},{f:"rgba(217,119,6,.3)",s:"#d97706"},
    {f:"rgba(6,182,212,.3)",s:"#06b6d4"},{f:"rgba(99,102,241,.3)",s:"#6366f1"}
  ];

  let pts=[],cents=[],k=3,n=150,iter=0,run=false,done=false,tid=null,hist=[],preset="random";
  const cv=document.getElementById("cv"),cx=cv.getContext("2d");
  const cc=document.getElementById("ch"),hx=cc.getContext("2d");
  const $=id=>document.getElementById(id),ex=$("ex");

  // Resize
  function resize(){
    const d=devicePixelRatio||1;
    const w=cv.parentElement.getBoundingClientRect().width;
    cv.width=w*d;cv.height=w*d;cv.style.width=cv.style.height=w+"px";
    cx.setTransform(d,0,0,d,0,0);
    const r=cc.parentElement.getBoundingClientRect();
    cc.width=r.width*d;cc.height=r.height*d;cc.style.width=r.width+"px";cc.style.height=r.height+"px";
    hx.setTransform(d,0,0,d,0,0);
    draw();chart();
  }
  function S(){return cv.width/(devicePixelRatio||1)}

  // Draw
  function draw(){
    const s=S();cx.clearRect(0,0,s,s);
    // Lines to centroids
    if(cents.length&&iter>0){
      cx.globalAlpha=.12;cx.lineWidth=1;
      for(const p of pts){if(p.c<0)continue;cx.beginPath();cx.moveTo(p.x*s,p.y*s);cx.lineTo(cents[p.c].x*s,cents[p.c].y*s);cx.strokeStyle=COL[p.c%8].s;cx.stroke();}
      cx.globalAlpha=1;
    }
    // Points
    for(const p of pts){const c=p.c>=0?COL[p.c%8]:{f:"rgba(0,0,0,.08)",s:"#999"};cx.beginPath();cx.arc(p.x*s,p.y*s,4,0,7);cx.fillStyle=c.f;cx.strokeStyle=c.s;cx.lineWidth=1.5;cx.fill();cx.stroke();}
    // Centroids
    for(let i=0;i<cents.length;i++){const c=COL[i%8],x=cents[i].x*s,y=cents[i].y*s;
      cx.beginPath();cx.arc(x,y,12,0,7);cx.strokeStyle=c.s;cx.lineWidth=2;cx.stroke();
      cx.beginPath();cx.arc(x,y,5,0,7);cx.fillStyle=c.s;cx.fill();}
  }

  // SSE chart
  function chart(){
    const w=cc.width/(devicePixelRatio||1),h=cc.height/(devicePixelRatio||1);
    hx.clearRect(0,0,w,h);
    if(!hist.length){hx.fillStyle="#999";hx.font="600 13px sans-serif";hx.textAlign="center";hx.fillText("目的関数 (SSE)",w/2,h/2+4);return;}
    const p={t:20,r:12,b:22,l:52},gw=w-p.l-p.r,gh=h-p.t-p.b;
    const raw_mn=Math.min(...hist),raw_mx=Math.max(...hist);
    const range=raw_mx-raw_mn||raw_mx*.1||1,margin=range*.15;
    const mn=Math.max(0,raw_mn-margin),mx=raw_mx+margin;
    hx.fillStyle="#666";hx.font="600 11px monospace";hx.textAlign="left";hx.fillText("SSE",p.l,p.t-6);
    hx.strokeStyle="#ebebeb";hx.lineWidth=1;hx.beginPath();hx.moveTo(p.l,p.t);hx.lineTo(p.l,p.t+gh);hx.lineTo(p.l+gw,p.t+gh);hx.stroke();
    hx.fillStyle="#999";hx.font="600 10px monospace";hx.textAlign="right";
    for(let i=0;i<=3;i++){const y=p.t+gh-gh*i/3,v=mn+(mx-mn)*i/3;hx.fillText(v.toFixed(2),p.l-4,y+3);if(i){hx.beginPath();hx.moveTo(p.l,y);hx.lineTo(p.l+gw,y);hx.strokeStyle="#f0f0f0";hx.stroke();}}
    hx.textAlign="center";hx.font="600 10px monospace";const xs=Math.max(1,Math.ceil(hist.length/6));
    for(let i=0;i<hist.length;i+=xs){hx.fillText(i+1,p.l+i/Math.max(hist.length-1,1)*gw,p.t+gh+14);}
    hx.beginPath();
    for(let i=0;i<hist.length;i++){const x=p.l+i/Math.max(hist.length-1,1)*gw,y=p.t+gh-(hist[i]-mn)/(mx-mn)*gh;i?hx.lineTo(x,y):hx.moveTo(x,y);}
    hx.strokeStyle="#0a72ef";hx.lineWidth=2;hx.stroke();
    for(let i=0;i<hist.length;i++){const x=p.l+i/Math.max(hist.length-1,1)*gw,y=p.t+gh-(hist[i]-mn)/(mx-mn)*gh;hx.beginPath();hx.arc(x,y,3,0,7);hx.fillStyle="#0a72ef";hx.fill();}
  }

  function sse(){let s=0;for(const p of pts){if(p.c<0)continue;s+=(p.x-cents[p.c].x)**2+(p.y-cents[p.c].y)**2;}return s;}

  // Random init
  function init(){
    cents=[];iter=0;done=false;hist=[];for(const p of pts)p.c=-1;
    if(!pts.length)return;
    const idx=new Set();while(idx.size<Math.min(k,pts.length))idx.add(Math.random()*pts.length|0);
    for(const i of idx)cents.push({x:pts[i].x,y:pts[i].y});
    ex.textContent=`データ点から ${k} 個をランダムに選び初期クラスタ中心としました．`;
  }

  // Step
  function step(){
    if(!pts.length||!cents.length)return;
    let chg=0;
    for(const p of pts){let b=0,bd=1/0;for(let i=0;i<cents.length;i++){const d=(p.x-cents[i].x)**2+(p.y-cents[i].y)**2;if(d<bd){bd=d;b=i;}}if(p.c!==b){p.c=b;chg++;}}
    const old=cents.map(c=>({...c}));
    for(let i=0;i<cents.length;i++){const m=pts.filter(p=>p.c===i);if(m.length)cents[i]={x:m.reduce((s,p)=>s+p.x,0)/m.length,y:m.reduce((s,p)=>s+p.y,0)/m.length};}
    iter++;const s=sse();hist.push(s);done=chg===0;
    const mv=cents.reduce((s,c,i)=>s+Math.hypot(c.x-old[i].x,c.y-old[i].y),0);
    ex.textContent=done
      ?`イテレーション ${iter} で収束．全点の割り当てが不変．最終 SSE = ${s.toFixed(4)}`
      :`【イテレーション ${iter}】割り当て: 各点を最近隣中心に配属（${chg} 点が移動）→ 更新: 重心を再計算（移動量計 ${mv.toFixed(4)}）→ SSE = ${s.toFixed(4)}${hist.length>1?` (前回比 ${(s-hist[hist.length-2]).toFixed(4)})`:``}`;
  }

  // Data generators
  function rn(){let u=0,v=0;while(!u)u=Math.random();while(!v)v=Math.random();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}
  function cl(v){return Math.max(.03,Math.min(.97,v));}
  const gen={
    blobs(){const cs=Array.from({length:k},()=>({x:.2+Math.random()*.6,y:.2+Math.random()*.6}));return Array.from({length:n},(_,i)=>{const c=cs[i%k];return{x:cl(c.x+rn()*.07),y:cl(c.y+rn()*.07),c:-1};});},
    ring(){return Array.from({length:n},(_,i)=>{const inner=i<n*.35,r=inner?Math.random()*.08:.25+rn()*.03,a=Math.random()*Math.PI*2;return{x:cl(.5+r*Math.cos(a)),y:cl(.5+r*Math.sin(a)),c:-1};});},
    moons(){const h=n>>1;return Array.from({length:n},(_,i)=>{const a=i<h?Math.PI*i/h:Math.PI+Math.PI*(i-h)/(n-h);const ox=i<h?.35:.55,oy=i<h?.45:.35;return{x:cl(ox+.2*Math.cos(a)+rn()*.025),y:cl(oy+.2*Math.sin(a)+rn()*.025),c:-1};});},
    random(){return Array.from({length:n},()=>({x:.05+Math.random()*.9,y:.05+Math.random()*.9,c:-1}));}
  };

  function load(name){
    stop();preset=name;pts=gen[name]();cents=[];iter=0;done=false;hist=[];
    ex.textContent=`${name} データ (${n}点) を生成．Step / Run でクラスタリングを開始．`;
    draw();chart();ui();maybeAuto();
  }
  function reset(){stop();cents=[];iter=0;done=false;hist=[];for(const p of pts)p.c=-1;ex.textContent="リセット．データはそのまま．";draw();chart();ui();}
  function stop(){run=false;if(tid){clearTimeout(tid);tid=null;}}
  function loop(){if(!run||done){run=false;ui();return;}step();draw();chart();ui();if(!done)tid=setTimeout(loop,400);else{run=false;ui();}}
  function maybeAuto(){if($("ap").checked&&pts.length>=k){if(!cents.length)init();draw();chart();run=true;ui();loop();}}

  function ui(){
    $("sn").textContent=pts.length;$("si").textContent=iter||"—";
    $("ss").textContent=hist.length?hist[hist.length-1].toFixed(4):"—";
    const b=$("sb");if(done){b.textContent="収束";b.className="badge ok";}else if(run){b.textContent="実行中";b.className="badge";}else if(pts.length){b.textContent="準備完了";b.className="badge";}else{b.textContent="待機中";b.className="badge";}
    $("bs").disabled=!(pts.length>=k&&!done)||run;$("br").disabled=!(pts.length>=k&&!done)&&!run;$("br").textContent=run?"Stop":"Run";
  }

  // Events
  cv.addEventListener("click",e=>{if(run)return;const r=cv.getBoundingClientRect();pts.push({x:(e.clientX-r.left)/r.width,y:(e.clientY-r.top)/r.height,c:-1});if(iter>0)reset();draw();ui();});
  $("ks").oninput=function(){k=+this.value;$("kv").textContent=k;if(iter>0)reset();ui();};
  $("ns").oninput=function(){n=+this.value;$("nv").textContent=n;load(preset);};
  $("bs").onclick=()=>{if(!cents.length)init();step();draw();chart();ui();};
  $("br").onclick=()=>{if(run){stop();ui();return;}if(!cents.length)init();run=true;ui();loop();};
  $("bx").onclick=reset;
  document.querySelectorAll("[data-p]").forEach(b=>b.onclick=()=>load(b.dataset.p));
  $("ap").onchange=()=>{if($("ap").checked&&!run&&pts.length>=k&&!done){if(iter>0)reset();setTimeout(maybeAuto,50);}};

  window.addEventListener("resize",resize);
  resize();load("random");
})();
</script>
</body>
</html>
